<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NeuroBook AI</title>
<style>
body {
    margin: 0;
    font-family: 'Georgia', serif;
    background: linear-gradient(135deg, #0f0f0f, #1c1c1c);
    color: white;
    text-align: center;
}

header {
    padding: 40px;
    font-size: 40px;
    font-weight: bold;
    letter-spacing: 2px;
}

input, select, button {
    padding: 12px;
    margin: 10px;
    border-radius: 8px;
    border: none;
    font-size: 16px;
}

button {
    background: #6a5acd;
    color: white;
    cursor: pointer;
}

button:hover {
    background: #836fff;
}

#bookContainer {
    margin: 40px auto;
    width: 80%;
    max-width: 900px;
}

.book-cover {
    padding: 60px;
    border-radius: 12px;
    margin-bottom: 40px;
    font-size: 28px;
    font-weight: bold;
}

.page {
    background: white;
    color: black;
    padding: 30px;
    margin-bottom: 20px;
    border-radius: 8px;
    text-align: left;
}

footer {
    margin: 50px;
    font-size: 14px;
    opacity: 0.5;
}
</style>
</head>
<body>

<header>NeuroBook AI</header>

<div>
<input id="titleInput" placeholder="Book Title">
<select id="genreSelect">
<option>Fantasy</option>
<option>Science Fiction</option>
<option>Horror</option>
<option>Romance</option>
<option>Thriller</option>
</select>
<select id="lengthSelect">
<option value="3">Short (3 Chapters)</option>
<option value="6">Medium (6 Chapters)</option>
<option value="10">Long (10 Chapters)</option>
</select>
<button onclick="generateBook()">Generate Book</button>
<button onclick="downloadPDF()">Download PDF</button>
</div>

<div id="bookContainer"></div>

<footer>Pure Algorithmic AI Book Engine</footer>

<script>
// Word banks
const names = ["Arin", "Lyra", "Kade", "Nyx", "Dorian", "Selene", "Orin", "Vera"];
const locations = ["ancient forest", "abandoned city", "distant galaxy", "hidden kingdom", "underground vault"];
const objects = ["crystal shard", "forbidden manuscript", "ancient sword", "neural device", "cursed relic"];
const emotions = ["fear", "hope", "rage", "curiosity", "desperation"];
const actions = ["whispered", "ran", "discovered", "destroyed", "escaped", "questioned", "fought"];

function random(arr){
    return arr[Math.floor(Math.random() * arr.length)];
}

function generateParagraph(){
    let paragraph = "";
    for(let i = 0; i < 6; i++){
        paragraph += `${random(names)} ${random(actions)} through the ${random(locations)}, driven by ${random(emotions)} and the mystery of the ${random(objects)}. `;
    }
    return paragraph;
}

function generateBook(){
    const container = document.getElementById("bookContainer");
    container.innerHTML = "";

    const title = document.getElementById("titleInput").value || "Untitled Chronicle";
    const genre = document.getElementById("genreSelect").value;
    const chapters = document.getElementById("lengthSelect").value;

    // Generate Cover
    const cover = document.createElement("div");
    cover.className = "book-cover";
    cover.style.background = `linear-gradient(135deg, hsl(${Math.random()*360},70%,40%), hsl(${Math.random()*360},70%,20%))`;
    cover.innerHTML = `<div>${title}</div><div style="font-size:18px;margin-top:20px;">A ${genre} Novel</div>`;
    container.appendChild(cover);

    // Generate Chapters
    for(let c = 1; c <= chapters; c++){
        const page = document.createElement("div");
        page.className = "page";
        page.innerHTML = `<h2>Chapter ${c}</h2><p>${generateParagraph()}</p><p>${generateParagraph()}</p>`;
        container.appendChild(page);
    }
}

function downloadPDF(){
    window.print();
}
</script>

</body>
</html>
