<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NeuroBook Studio</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin:0;
    background:#111;
    font-family: Georgia, serif;
    color:white;
    text-align:center;
}

header {
    padding:30px;
    font-size:32px;
    letter-spacing:2px;
}

.controls {
    margin:20px;
}

input, textarea, select, button {
    padding:10px;
    margin:8px;
    border-radius:6px;
    border:none;
    font-size:15px;
}

textarea {
    width:300px;
    height:80px;
}

button {
    background:#6a5acd;
    color:white;
    cursor:pointer;
}

button:hover {
    background:#836fff;
}

#book {
    margin-top:40px;
}

.cover {
    width:400px;
    height:600px;
    margin:30px auto;
    border-radius:10px;
    position:relative;
    overflow:hidden;
    color:white;
    box-shadow:0 20px 40px rgba(0,0,0,0.6);
}

.cover-text {
    position:absolute;
    width:100%;
    text-align:center;
    padding:30px;
}

.cover-title {
    font-size:28px;
    font-weight:bold;
    margin-top:100px;
}

.cover-author {
    position:absolute;
    bottom:40px;
    width:100%;
    font-size:18px;
}

.page {
    width:600px;
    height:800px;
    margin:40px auto;
    background:white;
    color:black;
    padding:80px;
    box-sizing:border-box;
    text-align:justify;
    line-height:1.6;
    font-size:16px;
    border-radius:4px;
}

.page h2 {
    text-align:center;
}

.illustration {
    width:100%;
    height:250px;
    margin:20px 0;
    border-radius:6px;
}
</style>
</head>

<body>

<header>NeuroBook Studio</header>

<div class="controls">
<input id="title" placeholder="Book Title">
<input id="author" placeholder="Author Name">
<br>
<textarea id="concept" placeholder="Short concept (e.g., A girl discovers a portal to a frozen world...)"></textarea>
<br>
<select id="illustrations">
<option value="yes">Include Illustrations</option>
<option value="no">No Illustrations</option>
</select>
<br>
<button onclick="generateBook()">Generate Book</button>
<button onclick="window.print()">Download / Print</button>
</div>

<div id="book"></div>

<script>
const words = ["shadow","light","storm","echo","void","ember","whisper","memory","dream","signal","rift","fate"];
const actions = ["rose","collapsed","whispered","fractured","burned","shifted","waited","vanished"];
const feelings = ["fear","hope","doubt","longing","curiosity","terror"];

function random(arr){
    return arr[Math.floor(Math.random()*arr.length)];
}

function generateParagraph(concept){
    let text="";
    for(let i=0;i<10;i++){
        text += concept.split(" ")[0] + " " + random(actions) + 
        " beneath the " + random(words) + 
        ", carrying " + random(feelings) + 
        " through the " + random(words) + ". ";
    }
    return text;
}

function createIllustration(canvas, seed){
    const ctx = canvas.getContext("2d");
    const hue = Math.floor(Math.random()*360);
    ctx.fillStyle = `hsl(${hue},70%,30%)`;
    ctx.fillRect(0,0,canvas.width,canvas.height);

    for(let i=0;i<20;i++){
        ctx.beginPath();
        ctx.arc(Math.random()*canvas.width,
                Math.random()*canvas.height,
                Math.random()*80,
                0,Math.PI*2);
        ctx.fillStyle = `hsla(${hue+50},70%,60%,0.2)`;
        ctx.fill();
    }
}

function generateCoverIllustration(canvas){
    const ctx = canvas.getContext("2d");
    const hue = Math.floor(Math.random()*360);
    ctx.fillStyle = `linear-gradient`;
    ctx.fillStyle = `hsl(${hue},70%,25%)`;
    ctx.fillRect(0,0,canvas.width,canvas.height);

    for(let i=0;i<40;i++){
        ctx.beginPath();
        ctx.arc(Math.random()*canvas.width,
                Math.random()*canvas.height,
                Math.random()*120,
                0,Math.PI*2);
        ctx.fillStyle = `hsla(${hue+80},70%,50%,0.15)`;
        ctx.fill();
    }
}

function generateBook(){
    const book = document.getElementById("book");
    book.innerHTML="";

    const title = document.getElementById("title").value || "Untitled";
    const author = document.getElementById("author").value || "Anonymous";
    const concept = document.getElementById("concept").value || "Someone";
    const includeImages = document.getElementById("illustrations").value;

    // Cover
    const cover = document.createElement("div");
    cover.className="cover";

    const canvas = document.createElement("canvas");
    canvas.width=400;
    canvas.height=600;
    generateCoverIllustration(canvas);

    cover.appendChild(canvas);

    const textLayer = document.createElement("div");
    textLayer.className="cover-text";
    textLayer.innerHTML=`
        <div class="cover-title">${title}</div>
        <div class="cover-author">${author}</div>
    `;
    cover.appendChild(textLayer);
    book.appendChild(cover);

    // Pages
    for(let c=1;c<=5;c++){
        const page=document.createElement("div");
        page.className="page";
        page.innerHTML=`<h2>Chapter ${c}</h2>`;

        if(includeImages==="yes"){
            const imgCanvas=document.createElement("canvas");
            imgCanvas.width=400;
            imgCanvas.height=250;
            imgCanvas.className="illustration";
            createIllustration(imgCanvas,c);
            page.appendChild(imgCanvas);
        }

        const p=document.createElement("p");
        p.innerText=generateParagraph(concept);
        page.appendChild(p);

        book.appendChild(page);
    }
}
</script>

</body>
</html>
