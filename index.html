<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NeuroNarrative Studio</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    background:#111;
    font-family: Georgia, serif;
    color:white;
    text-align:center;
}
header{
    padding:30px;
    font-size:30px;
    letter-spacing:2px;
}
.controls{
    margin:20px;
}
input, textarea, select, button{
    padding:10px;
    margin:8px;
    border-radius:6px;
    border:none;
    font-size:14px;
}
textarea{
    width:300px;
    height:80px;
}
button{
    background:#5d5dfc;
    color:white;
    cursor:pointer;
}
button:hover{
    background:#7878ff;
}
.cover{
    width:400px;
    height:600px;
    margin:40px auto;
    border-radius:10px;
    overflow:hidden;
    position:relative;
    box-shadow:0 25px 50px rgba(0,0,0,.6);
}
.cover-text{
    position:absolute;
    width:100%;
    top:30%;
    text-align:center;
}
.cover h1{
    font-size:26px;
}
.cover h3{
    position:absolute;
    bottom:30px;
    width:100%;
}
.page{
    width:500px;
    height:780px;
    margin:40px auto;
    background:white;
    color:black;
    padding:70px;
    box-sizing:border-box;
    text-align:justify;
    line-height:1.6;
    font-size:15px;
    position:relative;
}
.page-number{
    position:absolute;
    bottom:20px;
    right:40px;
    font-size:12px;
}
.dropcap:first-letter{
    float:left;
    font-size:42px;
    line-height:32px;
    padding-right:6px;
}
canvas{
    display:block;
}
</style>
</head>

<body>

<header>NeuroNarrative Studio (Pure Code AI)</header>

<div class="controls">
<input id="title" placeholder="Book Title">
<input id="author" placeholder="Author Name"><br>
<textarea id="concept" placeholder="Short story concept..."></textarea><br>
<select id="genre">
<option>Fantasy</option>
<option>SciFi</option>
<option>Horror</option>
<option>Romance</option>
<option>Thriller</option>
</select>
<select id="illustrations">
<option value="yes">Include Illustrations</option>
<option value="no">No Illustrations</option>
</select><br>
<button onclick="generateBook()">Generate Book</button>
<button onclick="window.print()">Download / Print</button>
</div>

<div id="book"></div>

<script>

// ---------------- STORY ENGINE ----------------

function random(arr){
    return arr[Math.floor(Math.random()*arr.length)];
}

const names = ["Arin","Lyra","Dorian","Nyx","Kael","Selene","Orin","Vera"];
const traits = ["brave","cautious","ruthless","curious","lonely","determined"];
const fears = ["abandonment","failure","darkness","loss","truth"];
const goals = ["save the world","find the truth","escape the past","protect someone","destroy the threat"];
const obstacles = ["a hidden empire","an ancient machine","a forbidden ritual","a corrupt ruler","an unstoppable force"];

function createCharacter(role){
    return {
        name: random(names),
        role: role,
        trait: random(traits),
        fear: random(fears),
        goal: random(goals),
        growth: 0
    }
}

function createStoryState(title,author,genre,concept){
    return {
        title,
        author,
        genre,
        concept,
        protagonist: createCharacter("protagonist"),
        antagonist: createCharacter("antagonist"),
        conflict: random(obstacles),
        act: 1,
        tension: 0,
        memory:[]
    }
}

// ------------- ACT STRUCTURE ENGINE -------------

function generateChapter(story, chapterNumber){

    if(chapterNumber <= 2) story.act = 1;
    else if(chapterNumber <= 4) story.act = 2;
    else story.act = 3;

    story.tension += 2;

    let text = "";

    if(story.act === 1){
        text += `${story.protagonist.name} was ${story.protagonist.trait}, yet deeply afraid of ${story.protagonist.fear}. `;
        text += `When ${story.conflict} emerged, everything changed. `;
        story.memory.push("inciting incident");
    }

    if(story.act === 2){
        text += `The presence of ${story.conflict} grew stronger. `;
        text += `${story.protagonist.name} struggled to ${story.protagonist.goal}. `;
        text += `${story.antagonist.name} manipulated events from the shadows. `;
        story.protagonist.growth += 1;
        story.memory.push("midpoint escalation");
    }

    if(story.act === 3){
        text += `In the final confrontation, ${story.protagonist.name} faced ${story.antagonist.name}. `;
        text += `Fear of ${story.protagonist.fear} no longer controlled them. `;
        text += `The battle against ${story.conflict} reached its peak. `;
        story.protagonist.growth += 2;
        story.memory.push("resolution");
    }

    return text;
}

// ------------- COVER ENGINE -------------

function drawCover(canvas, genre){
    const ctx = canvas.getContext("2d");

    const colors = {
        Fantasy: ["#4b0082","#8a2be2"],
        SciFi: ["#001f3f","#0074D9"],
        Horror: ["#111","#660000"],
        Romance: ["#ff69b4","#ff1493"],
        Thriller: ["#222","#444"]
    };

    let palette = colors[genre];

    let grad = ctx.createLinearGradient(0,0,400,600);
    grad.addColorStop(0,palette[0]);
    grad.addColorStop(1,palette[1]);
    ctx.fillStyle = grad;
    ctx.fillRect(0,0,400,600);

    for(let i=0;i<30;i++){
        ctx.beginPath();
        ctx.arc(Math.random()*400,Math.random()*600,Math.random()*100,0,Math.PI*2);
        ctx.fillStyle="rgba(255,255,255,0.05)";
        ctx.fill();
    }
}

// ------------- BOOK GENERATOR -------------

function generateBook(){

    const book = document.getElementById("book");
    book.innerHTML="";

    const title = document.getElementById("title").value || "Untitled";
    const author = document.getElementById("author").value || "Anonymous";
    const concept = document.getElementById("concept").value || "A turning point";
    const genre = document.getElementById("genre").value;
    const includeImages = document.getElementById("illustrations").value;

    let story = createStoryState(title,author,genre,concept);

    // Cover
    const cover = document.createElement("div");
    cover.className="cover";

    const canvas = document.createElement("canvas");
    canvas.width=400;
    canvas.height=600;
    drawCover(canvas,genre);

    cover.appendChild(canvas);

    const textLayer=document.createElement("div");
    textLayer.className="cover-text";
    textLayer.innerHTML=`<h1>${title}</h1><h3>${author}</h3>`;
    cover.appendChild(textLayer);

    book.appendChild(cover);

    // Pages
    for(let i=1;i<=6;i++){
        const page=document.createElement("div");
        page.className="page";

        const chapterText=generateChapter(story,i);

        if(includeImages==="yes"){
            const img=document.createElement("canvas");
            img.width=360;
            img.height=200;
            drawCover(img,genre);
            page.appendChild(img);
        }

        const p=document.createElement("p");
        p.className="dropcap";
        p.innerText=chapterText;
        page.appendChild(p);

        const number=document.createElement("div");
        number.className="page-number";
        number.innerText=i;
        page.appendChild(number);

        book.appendChild(page);
    }
}

</script>

</body>
</html>
