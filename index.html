<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIHive Offline AI Chatbot</title>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0/dist/tf.min.js"></script>

<style>
  body { font-family: Arial, sans-serif; background:#f5f5f5; padding:2rem;}
  .chatbox { border:1px solid #ccc; min-height:250px; padding:1rem; background:white; overflow-y:auto;}
  .message { margin:0.5rem 0;}
  .user { font-weight: bold; color:#4f46e5;}
  .ai { font-weight: bold; color:#111;}
  input { width:80%; padding:0.6rem; border-radius:0.4rem; border:1px solid #ccc; }
  button { padding:0.6rem 1rem; background:#4f46e5; color:white; border:none; border-radius:0.4rem;}
</style>
</head>
<body>

<h2>AIHive Offline AI Chat</h2>
<div class="chatbox" id="chatbox"></div>

<form id="chat-form">
  <input type="text" id="user-input" placeholder="Ask me anything..." required />
  <button type="submit">Send</button>
</form>

<script>
// ================================
// 1. Training Data (very small set)
// ================================
const trainingData = [
  { text: "tell me about marketing", label: "marketing" },
  { text: "how do I post on social media", label: "marketing" },
  { text: "what is pricing", label: "pricing" },
  { text: "how much does it cost", label: "pricing" },
  { text: "support chatbot", label: "support" },
  { text: "help with ai support", label: "support" },
  { text: "hello", label: "greeting" },
  { text: "hi there", label: "greeting" },
  { text: "tell me about content", label: "content" },
  { text: "generate a blog", label: "content" }
];

// ================================
// 2. Possible Responses
// ================================
const responses = {
  greeting: "Hi there! How can AIHive assist your business today?",
  marketing: "AIHive can auto-generate social media posts, email campaigns, and ad copy.",
  pricing: "Our plans start at $199/mo for Basic up to $699/mo for Premium.",
  support: "AIHive's support bot can answer FAQs and schedule appointments.",
  content: "AIHive can generate blogs, product copy, and video scripts!",
  fallback: "I’m still learning — can you try asking another way?"
};

// ================================
// 3. Simple Text Vectorizer
// ================================
function textToVector(str) {
  const words = str.toLowerCase().split(/\W+/);
  return words.reduce((vec, w) => {
    vec[w] = (vec[w] || 0) + 1;
    return vec;
  }, {});
}

// ================================
// 4. Build Vocabulary
// ================================
const vocab = {};
trainingData.forEach(item => {
  item.text.toLowerCase().split(/\W+/).forEach(word => {
    if (!vocab[word]) vocab[word] = Object.keys(vocab).length;
  });
});

// ================================
// 5. Vectorize Training Inputs
// ================================
const xs = [];
const labels = [];
const labelToIndex = {};
let nextLabelIndex = 0;

trainingData.forEach(item => {
  const vec = new Array(Object.keys(vocab).length).fill(0);
  textToVector(item.text).forEach((count, word) => {
    if (vocab[word] !== undefined) vec[vocab[word]] = count;
  });

  xs.push(vec);

  if (!(item.label in labelToIndex)) {
    labelToIndex[item.label] = nextLabelIndex++;
  }
  labels.push(labelToIndex[item.label]);
});

// ================================
// 6. Convert to Tensors
// ================================
const xsTensor = tf.tensor2d(xs);
const ysTensor = tf.oneHot(tf.tensor1d(labels, "int32"), nextLabelIndex);

// ================================
// 7. Build Model
// ================================
const model = tf.sequential();
model.add(tf.layers.dense({ units: 16, activation: "relu", inputShape: [Object.keys(vocab).length] }));
model.add(tf.layers.dense({ units: nextLabelIndex, activation: "softmax" }));

model.compile({
  optimizer: tf.train.adam(0.01),
  loss: "categoricalCrossentropy",
  metrics: ["accuracy"]
});

// ================================
// 8. Train Model
// ================================
(async () => {
  await model.fit(xsTensor, ysTensor, { epochs: 150 });
  console.log("Model trained!");
})();

// ================================
// 9. Predict Function
// ================================
async function predictIntent(text) {
  const vec = new Array(Object.keys(vocab).length).fill(0);
  const wordMap = textToVector(text);
  Object.keys(wordMap).forEach(w => {
    if (vocab[w] !== undefined) vec[vocab[w]] = wordMap[w];
  });
  const inputTensor = tf.tensor2d([vec]);
  const prediction = model.predict(inputTensor);
  const index = (await prediction.argMax(-1).data())[0];

  return Object.keys(labelToIndex).find(k => labelToIndex[k] === index) || "fallback";
}

// ================================
// 10. Chat UI Logic
// ================================
const chatbox = document.getElementById("chatbox");
const form = document.getElementById("chat-form");
const userInput = document.getElementById("user-input");

function append(msg, cls) {
  const p = document.createElement("p");
  p.classList.add("message");
  p.innerHTML = `<span class="${cls}">${msg}</span>`;
  chatbox.appendChild(p);
  chatbox.scrollTop = chatbox.scrollHeight;
}

form.addEventListener("submit", async (e) => {
  e.preventDefault();
  const text = userInput.value;
  append("You: " + text, "user");
  const intent = await predictIntent(text);
  append("AIHive: " + (responses[intent] || responses.fallback), "ai");
  userInput.value = "";
});
</script>

</body>
</html>
