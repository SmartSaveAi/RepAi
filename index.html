<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>StoryForge Pro</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
*{box-sizing:border-box}
body{
margin:0;
font-family:Inter, sans-serif;
background:#0f172a;
color:white;
}
header{
padding:20px 40px;
background:#111827;
font-weight:600;
border-bottom:1px solid #1f2937;
}
.container{
display:flex;
height:100vh;
}
.sidebar{
width:320px;
background:#111827;
padding:25px;
overflow-y:auto;
border-right:1px solid #1f2937;
}
.preview{
flex:1;
padding:40px;
overflow-y:auto;
}
input,textarea,select{
width:100%;
margin-bottom:12px;
padding:10px;
border:none;
border-radius:6px;
background:#1f2937;
color:white;
}
button{
width:100%;
padding:12px;
background:#6366f1;
border:none;
border-radius:6px;
color:white;
font-weight:600;
cursor:pointer;
}
button:hover{background:#818cf8}
.book-page{
background:white;
color:black;
margin:40px auto;
padding:60px;
border-radius:6px;
box-shadow:0 15px 40px rgba(0,0,0,.3);
position:relative;
}
.speech{
position:absolute;
background:white;
border:3px solid black;
border-radius:20px;
padding:10px 15px;
font-size:14px;
}
</style>
</head>
<body>

<header>StoryForge Pro — Pure Code Publishing Engine</header>

<div class="container">
<div class="sidebar">

<h3>Book Settings</h3>

<input id="title" placeholder="Title">
<input id="author" placeholder="Author">
<textarea id="concept" placeholder="Short Concept"></textarea>

<select id="mode">
<option value="novel">Novel Mode</option>
<option value="children">Children's Illustrated</option>
<option value="graphic">Graphic Novel</option>
</select>

<select id="trim">
<option value="500x780">5x8</option>
<option value="600x900">6x9</option>
<option value="850x1100">8.5x11</option>
</select>

<button onclick="generate()">Generate Book</button>

</div>

<div class="preview" id="preview"></div>
</div>

<script>

// ---------- SEEDED RANDOM ----------
function createSeed(str){
let h=0;
for(let i=0;i<str.length;i++)
h=Math.imul(31,h)+str.charCodeAt(i)|0;
return h;
}

function RNG(seed){
return function(){
seed = (seed * 9301 + 49297) % 233280;
return seed/233280;
}
}

// ---------- GENERATE ----------
function generate(){

const preview=document.getElementById("preview");
preview.innerHTML="";

const title=document.getElementById("title").value||"Untitled";
const author=document.getElementById("author").value||"Anonymous";
const concept=document.getElementById("concept").value||"a strange machine";
const mode=document.getElementById("mode").value;
const trim=document.getElementById("trim").value.split("x");

const seed=createSeed(title+author+concept);
const rand=RNG(seed);

function random(arr){return arr[Math.floor(rand()*arr.length)]}

let hero={name:random(["Leo","Milo","Eli","Theo"]),emotion:"nervous"};
let villain={name:random(["Dr. Void","Zarnok","ShadowBot"])};

// Generate 5 chapters
for(let c=1;c<=5;c++){

const page=document.createElement("div");
page.className="book-page";
page.style.width=trim[0]+"px";
page.style.height=trim[1]+"px";

if(mode==="novel"){

for(let i=0;i<5;i++){
const p=document.createElement("p");
p.innerText=`${hero.name} stepped forward as ${villain.name}'s plan involving ${concept} grew stronger. The tension rose in chapter ${c}.`;
page.appendChild(p);
}

}

if(mode==="children"){

const canvas=document.createElement("canvas");
canvas.width=400;
canvas.height=250;
const ctx=canvas.getContext("2d");

ctx.fillStyle=`hsl(${rand()*360},70%,60%)`;
ctx.fillRect(0,0,400,250);

// cartoon head
ctx.fillStyle="yellow";
ctx.beginPath();
ctx.arc(150,120,40,0,Math.PI*2);
ctx.fill();

page.appendChild(canvas);

const p=document.createElement("p");
p.innerText=`${hero.name} learned that courage matters when facing ${villain.name}.`;
page.appendChild(p);

}

if(mode==="graphic"){

const canvas=document.createElement("canvas");
canvas.width=450;
canvas.height=400;
const ctx=canvas.getContext("2d");

ctx.fillStyle="#fff";
ctx.fillRect(0,0,450,400);
ctx.strokeRect(0,0,450,400);

ctx.fillStyle="black";
ctx.fillText(hero.name+"!",50,50);

page.appendChild(canvas);

const bubble=document.createElement("div");
bubble.className="speech";
bubble.style.top="120px";
bubble.style.left="100px";
bubble.innerText="We stop this now!";
page.appendChild(bubble);

}

preview.appendChild(page);
}

}

</script>
</body>
</html>
